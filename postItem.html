<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post an Item</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:450px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#1e293b;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

.post-btn{
    width:100%;
    padding:13px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.post-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.back-btn{
    width:100%;
    padding:13px;
    background:#e2e8f0;
    color:#1e293b;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:12px;
    transition:.3s;
}

.back-btn:hover{
    background:#cbd5e1;
}

</style>
</head>

<body>

<div class="container">

<h1>Post an Item</h1>

<form action="YOUR_PHP_FILE.php" method="POST">

<label>Title</label>
<input type="text" name="title" placeholder="Item title" required>

<label>Description</label>
<input type="text" name="description" placeholder="Describe your item" required>

<label>Category</label>
<input type="text" name="category" placeholder="Electronics, Clothing..." required>

<label>Price ($)</label>
<input type="number" name="price" step="0.01" min="0" placeholder="0.00" required>

<button class="post-btn" type="submit">
Post Item
</button>

</form>

<a href="welcome.php">
<button class="back-btn" type="button">
Back
</button>
</a>

</div>

</body>

</html>
