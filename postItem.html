<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post an Item</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
            animation: fadeIn .6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #1e293b;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            transition: .25s;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, .25);
        }

        .post-btn,
        .back-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        .post-btn {
            background: #2563eb;
            color: white;
        }

        .post-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .back-btn {
            background: #e2e8f0;
            color: #1e293b;
            margin-top: 15px;
        }

        .back-btn:hover {
            background: #cbd5e1;
        }

        a {
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>📦 Post an Item</h1>
        <p class="subtitle">Fill out the form below to list your item.</p>

        <form action="post item.php" method="POST">

            <label for="title">Title</label>
            <input
                type="text"
                id="title"
                name="title"
                placeholder="Enter item title"
                required>

            <label for="description">Description</label>
            <textarea
                id="description"
                name="description"
                placeholder="Describe your item..."
                required></textarea>

            <label for="category">Category</label>
            <select
                id="category"
                name="category"
                required>

                <option value="">Choose a Category</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Books</option>
                <option>Furniture</option>
                <option>Sports</option>
                <option>Home</option>
                <option>Other</option>

            </select>

            <label for="price">Price ($)</label>
            <input
                type="number"
                id="price"
                name="price"
                step="0.01"
                min="0"
                placeholder="0.00"
                required>

            <button class="post-btn" type="submit">
                📤 Post Item
            </button>

        </form>

        <a href="welcome.php">
            <button class="back-btn" type="button">
                ← Back to Welcome Page
            </button>
        </a>

    </div>

</body>

</html>
