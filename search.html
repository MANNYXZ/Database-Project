<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Items</title>

    <link rel="stylesheet" href="style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:500px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 20px 45px rgba(0,0,0,.35);
            animation:fadeIn .6s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{
            text-align:center;
            color:#1e293b;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#64748b;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#1e293b;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            font-size:15px;
            margin-bottom:20px;
            transition:.25s;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.25);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        .search-btn{
            background:#2563eb;
            color:white;
        }

        .search-btn:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
        }

        .back-btn{
            background:#e2e8f0;
            color:#1e293b;
            margin-top:15px;
        }

        .back-btn:hover{
            background:#cbd5e1;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🔍 Search Items</h1>

    <p class="subtitle">
        Search for marketplace items by category.
    </p>

    <form action="search.php" method="POST">

        <label for="category">Category</label>

        <input
            type="text"
            id="category"
            name="category"
            placeholder="Example: Electronics"
            required>

        <button class="search-btn" type="submit">
            Search
        </button>

    </form>

    <a href="welcome.php">

        <button class="back-btn" type="button">
            ← Back to Welcome
        </button>

    </a>

</div>

</body>

</html>
